# 6.1 surround speaker layout
#
# Rear-center 6.1 configuration.
# Total: 7 channels (including LFE)

speakers:
  - name: "FL"
    azimuth: -30.0
    elevation: 0.0
    spatialize: true

  - name: "FR"
    azimuth: 30.0
    elevation: 0.0
    spatialize: true

  - name: "C"
    azimuth: 0.0
    elevation: 0.0
    spatialize: true

  - name: "LFE"
    azimuth: 0.0
    elevation: 0.0
    spatialize: false

  - name: "SL"
    azimuth: -110.0
    elevation: 0.0
    spatialize: true

  - name: "SR"
    azimuth: 110.0
    elevation: 0.0
    spatialize: true

  - name: "RC"
    azimuth: 180.0
    elevation: 0.0
    spatialize: true
