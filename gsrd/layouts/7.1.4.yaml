# ITU-R BS.2051 7.1.4 immersive speaker layout
#
# Standard 7.1 bed with 4 height channels.
# Total: 12 channels (including LFE)

speakers:
  # Front layer
  - name: "FL"
    azimuth: -30.0
    elevation: 0.0
    spatialize: true

  - name: "FR"
    azimuth: 30.0
    elevation: 0.0
    spatialize: true

  - name: "C"
    azimuth: 0.0
    elevation: 0.0
    spatialize: true

  # LFE does not participate in VBAP
  - name: "LFE"
    azimuth: 0.0
    elevation: 0.0
    spatialize: false

  # Side surround layer
  - name: "SL"
    azimuth: -90.0
    elevation: 0.0
    spatialize: true

  - name: "SR"
    azimuth: 90.0
    elevation: 0.0
    spatialize: true

  # Rear surround layer
  - name: "BL"
    azimuth: -145.0
    elevation: 0.0
    spatialize: true

  - name: "BR"
    azimuth: 145.0
    elevation: 0.0
    spatialize: true

  # Height layer
  - name: "TFL"
    azimuth: -30.0
    elevation: 45.0
    spatialize: true

  - name: "TFR"
    azimuth: 30.0
    elevation: 45.0
    spatialize: true

  - name: "TBL"
    azimuth: -135.0
    elevation: 45.0
    spatialize: true

  - name: "TBR"
    azimuth: 135.0
    elevation: 45.0
    spatialize: true
