# ITU-R style 7.1 surround speaker layout
#
# Standard 7.1 configuration.
# Total: 8 channels (including LFE)

speakers:
  - name: "FL"
    azimuth: -30.0
    elevation: 0.0
    spatialize: true

  - name: "FR"
    azimuth: 30.0
    elevation: 0.0
    spatialize: true

  - name: "C"
    azimuth: 0.0
    elevation: 0.0
    spatialize: true

  - name: "LFE"
    azimuth: 0.0
    elevation: 0.0
    spatialize: false

  - name: "SL"
    azimuth: -90.0
    elevation: 0.0
    spatialize: true

  - name: "SR"
    azimuth: 90.0
    elevation: 0.0
    spatialize: true

  - name: "BL"
    azimuth: -145.0
    elevation: 0.0
    spatialize: true

  - name: "BR"
    azimuth: 145.0
    elevation: 0.0
    spatialize: true
