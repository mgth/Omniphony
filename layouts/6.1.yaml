# 6.1 surround speaker layout
#
# Rear-center 6.1 configuration in normalized Cartesian coordinates.
# LFE remains non-spatialized.
# Total: 7 channels (including LFE)

speakers:
  - name: "FL"
    coord_mode: "cartesian"
    x: -1.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "FR"
    coord_mode: "cartesian"
    x: 1.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "C"
    coord_mode: "cartesian"
    x: 0.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "LFE"
    coord_mode: "cartesian"
    x: 1.0
    y: 1.0
    z: -0.5
    spatialize: false

  - name: "SL"
    coord_mode: "cartesian"
    x: -1.0
    y: 0.0
    z: 0.0
    spatialize: true

  - name: "SR"
    coord_mode: "cartesian"
    x: 1.0
    y: 0.0
    z: 0.0
    spatialize: true

  - name: "RC"
    coord_mode: "cartesian"
    x: 0.0
    y: -1.0
    z: 0.0
    spatialize: true
