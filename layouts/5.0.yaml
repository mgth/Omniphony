# ITU-R BS.775 5.0 speaker layout
#
# Standard 5.0 surround configuration in normalized Cartesian coordinates.
# Total: 5 channels

speakers:
  - name: "FL"
    coord_mode: "cartesian"
    x: -1.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "FR"
    coord_mode: "cartesian"
    x: 1.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "C"
    coord_mode: "cartesian"
    x: 0.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "BL"
    coord_mode: "cartesian"
    x: -1.0
    y: -1.0
    z: 0.0
    spatialize: true

  - name: "BR"
    coord_mode: "cartesian"
    x: 1.0
    y: -1.0
    z: 0.0
    spatialize: true
