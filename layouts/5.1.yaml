# ITU-R BS.775 5.1 Speaker Layout
#
# Standard 5.1 surround sound configuration
# Total: 6 channels (including LFE)

speakers:
  # Front layer
  - name: "FL"
    azimuth: -26.565052
    elevation: 0.0
    distance: 2.236068
    spatialize: true

  - name: "FR"
    azimuth: 26.565052
    elevation: 0.0
    distance: 2.236068
    spatialize: true

  - name: "C"
    azimuth: 0.0
    elevation: 0.0
    distance: 2.0
    spatialize: true

  # LFE (Low Frequency Effects)
  # Excluded from VBAP - only receives bed channel
  - name: "LFE"
    azimuth: 26.565052
    elevation: -12.6043825
    distance: 2.291288
    spatialize: true

  # Rear surround layer
  - name: "BL"
    azimuth: -153.43495
    elevation: 0.0
    distance: 2.236068
    spatialize: true

  - name: "BR"
    azimuth: 153.43495
    elevation: 0.0
    distance: 2.236068
    spatialize: true
