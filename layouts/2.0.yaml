# ITU-R BS.775 stereo speaker layout
#
# Standard 2.0 configuration in normalized Cartesian coordinates.
# Total: 2 channels

speakers:
  - name: "FL"
    coord_mode: "cartesian"
    x: -1.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "FR"
    coord_mode: "cartesian"
    x: 1.0
    y: 1.0
    z: 0.0
    spatialize: true
