# 7.1.2 immersive speaker layout
#
# Standard 7.1 bed with 2 top-front channels in normalized Cartesian coordinates.
# LFE remains non-spatialized.
# Total: 10 channels (including LFE)

speakers:
  - name: "FL"
    coord_mode: "cartesian"
    x: -1.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "FR"
    coord_mode: "cartesian"
    x: 1.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "C"
    coord_mode: "cartesian"
    x: 0.0
    y: 1.0
    z: 0.0
    spatialize: true

  - name: "LFE"
    coord_mode: "cartesian"
    x: 1.0
    y: 1.0
    z: -0.5
    spatialize: false

  - name: "SL"
    coord_mode: "cartesian"
    x: -1.0
    y: 0.0
    z: 0.0
    spatialize: true

  - name: "SR"
    coord_mode: "cartesian"
    x: 1.0
    y: 0.0
    z: 0.0
    spatialize: true

  - name: "BL"
    coord_mode: "cartesian"
    x: -1.0
    y: -1.0
    z: 0.0
    spatialize: true

  - name: "BR"
    coord_mode: "cartesian"
    x: 1.0
    y: -1.0
    z: 0.0
    spatialize: true

  - name: "TFL"
    coord_mode: "cartesian"
    x: -1.0
    y: 1.0
    z: 1.0
    spatialize: true

  - name: "TFR"
    coord_mode: "cartesian"
    x: 1.0
    y: 1.0
    z: 1.0
    spatialize: true
